<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WEB POS Login</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
body{
    background:#f4f6f9;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}

.login-box{
    width:95%;
    max-width:900px;
    padding:80px;
    border-radius:25px;
    background:#fff;
    box-shadow:0 15px 40px rgba(0,0,0,.15);
}

.logo{
    font-size:120px;
}

h3{
    font-size:48px;
    font-weight:bold;
}

label{
    font-size:24px;
    font-weight:600;
}

.form-control{
    height:75px;
    font-size:24px;
    border-radius:12px;
}

.btn{
    height:75px;
    font-size:28px;
    font-weight:bold;
    border-radius:12px;
}

@media (max-width:768px){
    .login-box{
        max-width:95%;
        padding:30px;
    }

    .logo{
        font-size:70px;
    }

    h3{
        font-size:28px;
    }

    .form-control,
    .btn{
        height:55px;
        font-size:18px;
    }
}
</style>
</head>

<body>

<div class="login-box">

<div class="logo">
🏪
</div>

<h3 class="text-center mb-4">
WEB POS
</h3>

<form>

<div class="mb-3">
<label>Username</label>
<input
type="text"
class="form-control"
placeholder="Enter Username">
</div>

<div class="mb-3">
<label>Password</label>
<input
type="password"
class="form-control"
placeholder="Enter Password">
</div>

<div class="d-grid">
<button class="btn btn-primary btn-lg">
LOGIN
</button>
</div>

</form>

</div>

</body>
</html>
