{% extends "layout.html" %}

{% block title %}Edit Product{% endblock %}

{% block content %}

<h2>✏️ Edit Product</h2>

<form method="POST">

<div class="mb-3">
<label>Barcode</label>
<input type="text" name="barcode" value="{{ product.barcode }}" class="form-control">
</div>

<div class="mb-3">
<label>Product Name</label>
<input type="text" name="name" value="{{ product.name }}" class="form-control">
</div>

<div class="mb-3">
<label>Category</label>
<input type="text" name="category" value="{{ product.category }}" class="form-control">
</div>

<div class="mb-3">
<label>Price</label>
<input type="number" step="0.01" name="price" value="{{ product.price }}" class="form-control">
</div>

<div class="mb-3">
<label>Stock</label>
<input type="number" name="stock" value="{{ product.stock }}" class="form-control">
</div>

<button type="submit" class="btn btn-success">
Update Product
</button>

<a href="/products" class="btn btn-secondary">
Cancel
</a>

</form>

{% endblock %}
